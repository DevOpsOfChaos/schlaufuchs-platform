<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript im Frontend</title>
  <desc id="desc">Ruhige didaktische Übersicht zu Rolle von JavaScript</desc>
  <rect width="960" height="540" rx="32" fill="#f8fafc"/>
  <rect x="56" y="54" width="848" height="96" rx="24" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="92" y="108" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">JavaScript im Frontend</text>
  <text x="92" y="136" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">Rolle von JavaScript</text>
  <g font-family="Arial, sans-serif" font-size="20" fill="#1f2937">
    <rect x="72" y="208" width="240" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="104" y="256" font-weight="700">1. Struktur</text>
    <text x="104" y="294" font-size="17" fill="#475569">JavaScript kann auf Ereignisse reagieren.</text>
    <path d="M104 330h176" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>

    <rect x="360" y="208" width="240" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="392" y="256" font-weight="700">2. Wirkung</text>
    <text x="392" y="294" font-size="17" fill="#475569">Es kann Inhalte ändern, aber sollte Struktur</text>
    <path d="M392 330h176" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>

    <rect x="648" y="208" width="240" height="190" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="680" y="256" font-weight="700">3. Kontrolle</text>
    <text x="680" y="294" font-size="17" fill="#475569">Einfaches Verhalten braucht klare Zustände.</text>
    <path d="M680 330h176" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>
  </g>
  <path d="M312 303h48M600 303h48" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="m344 291 16 12-16 12M632 291l16 12-16 12" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="72" y="462" font-family="Arial, sans-serif" font-size="18" fill="#475569">Schlaufuchs v187 · Web Development · Überblick, Aufgabe und Lösung bleiben verbunden.</text>
</svg>
