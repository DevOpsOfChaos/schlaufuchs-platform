<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540">
<title id="title">Verschlüsselung, Hashing und Signaturen</title><desc id="desc">Didaktisches Schaubild zu Verschlüsselung, Hashing und Signaturen.</desc>
<style>.bg{fill:#f8fafc}.card{fill:#ffffff;stroke:#334155;stroke-width:2}.line{stroke:#334155;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{fill:#e2e8f0;stroke:#64748b;stroke-width:1.4}.accent{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.txt{font-family:Arial,Helvetica,sans-serif;font-size:19px;fill:#0f172a;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#334155}.label{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#0f172a;font-weight:700}</style>
<rect class="bg" width="960" height="540" rx="24"/><text class="txt" x="48" y="58">Verschlüsselung, Hashing und Signaturen</text>
