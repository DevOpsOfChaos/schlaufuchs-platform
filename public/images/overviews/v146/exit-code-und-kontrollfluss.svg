<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540">
<title id="title">Exit-Code und Kontrollfluss</title><desc id="desc">Schematische Übersicht für eine Schlaufuchs-Überblicksseite.</desc><style>
      .bg{fill:#f8fafc}.card{fill:#ffffff;stroke:#334155;stroke-width:2}.soft{fill:#e2e8f0;stroke:#475569;stroke-width:1.5}.line{stroke:#334155;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#64748b;stroke-width:1.6;fill:none}.txt{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#0f172a;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#334155}.label{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#0f172a;font-weight:600}.accent{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}
    </style><rect class="bg" x="0" y="0" width="960" height="540" rx="24"/><text class="txt" x="48" y="58">Exit-Code und Kontrollfluss</text><rect class="accent" x="360" y="120" width="240" height="70" rx="16"/><text class="label" text-anchor="middle" x="480" y="162">Befehl ausführen</text><path class="line" d="M480 190 V250"/><polygon class="card" points="480,250 590,320 480,390 370,320"/><text class="label" text-anchor="middle" x="480" y="326">Exit-Code?</text><path class="line" d="M370 320 H220 V430"/><path class="line" d="M590 320 H740 V430"/><text class="small" x="260" y="304">0</text><text class="small" x="645" y="304">≠0</text><rect class="ok" x="145" y="430" width="150" height="55" rx="14"/><text class="label" text-anchor="middle" x="220" y="464">Erfolgspfad</text><rect class="warn" x="665" y="430" width="150" height="55" rx="14"/><text class="label" text-anchor="middle" x="740" y="464">Fehlerpfad</text></svg>
