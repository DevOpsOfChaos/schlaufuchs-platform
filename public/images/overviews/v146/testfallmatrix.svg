<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540">
<title id="title">Testfallmatrix</title><desc id="desc">Schematische Übersicht für eine Schlaufuchs-Überblicksseite.</desc><style>
      .bg{fill:#f8fafc}.card{fill:#ffffff;stroke:#334155;stroke-width:2}.soft{fill:#e2e8f0;stroke:#475569;stroke-width:1.5}.line{stroke:#334155;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#64748b;stroke-width:1.6;fill:none}.txt{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#0f172a;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#334155}.label{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#0f172a;font-weight:600}.accent{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}
    </style><rect class="bg" x="0" y="0" width="960" height="540" rx="24"/><text class="txt" x="48" y="58">Testfallmatrix</text><rect class="card" x="160" y="130" width="640" height="280" rx="18"/><line class="muted" x1="160" y1="130" x2="160" y2="410"/><text class="label" text-anchor="middle" x="240" y="170">Eingabe</text><line class="muted" x1="320" y1="130" x2="320" y2="410"/><text class="label" text-anchor="middle" x="400" y="170">Bedingung</text><line class="muted" x1="480" y1="130" x2="480" y2="410"/><text class="label" text-anchor="middle" x="560" y="170">Erwartung</text><line class="muted" x1="640" y1="130" x2="640" y2="410"/><text class="label" text-anchor="middle" x="720" y="170">Risiko</text><line class="muted" x1="160" y1="200" x2="800" y2="200"/><line class="muted" x1="160" y1="260" x2="800" y2="260"/><line class="muted" x1="160" y1="320" x2="800" y2="320"/><line class="muted" x1="160" y1="380" x2="800" y2="380"/><text class="small" x="210" y="238">Normalfall</text><text class="small" x="370" y="298">Grenzfall</text><text class="small" x="530" y="358">Fehlerfall</text></svg>
