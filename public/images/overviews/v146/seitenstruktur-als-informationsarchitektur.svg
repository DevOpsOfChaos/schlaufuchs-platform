<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540">
<title id="title">Seitenstruktur als Informationsarchitektur</title><desc id="desc">Schematische Übersicht für eine Schlaufuchs-Überblicksseite.</desc><style>
      .bg{fill:#f8fafc}.card{fill:#ffffff;stroke:#334155;stroke-width:2}.soft{fill:#e2e8f0;stroke:#475569;stroke-width:1.5}.line{stroke:#334155;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#64748b;stroke-width:1.6;fill:none}.txt{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#0f172a;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#334155}.label{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#0f172a;font-weight:600}.accent{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}
