<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540">
<title id="title">Modellierungszyklus</title><desc id="desc">Schematische Übersicht für eine Schlaufuchs-Überblicksseite.</desc><style>
      .bg{fill:#f8fafc}.card{fill:#ffffff;stroke:#334155;stroke-width:2}.soft{fill:#e2e8f0;stroke:#475569;stroke-width:1.5}.line{stroke:#334155;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#64748b;stroke-width:1.6;fill:none}.txt{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#0f172a;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#334155}.label{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#0f172a;font-weight:600}.accent{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}
    </style><rect class="bg" x="0" y="0" width="960" height="540" rx="24"/><text class="txt" x="48" y="58">Modellierungszyklus</text><circle class="card" cx="480" cy="120" r="58"/><text class="label" text-anchor="middle" x="480" y="125">Situation</text><path class="line" d="M480 120 Q585.0 147.0 690 230" opacity="0.45"/><circle class="card" cx="690" cy="230" r="58"/><text class="label" text-anchor="middle" x="690" y="235">Annahmen</text><path class="line" d="M690 230 Q650.0 297.0 610 420" opacity="0.45"/><circle class="card" cx="610" cy="420" r="58"/><text class="label" text-anchor="middle" x="610" y="425">Modell</text><path class="line" d="M610 420 Q480.0 392.0 350 420" opacity="0.45"/><circle class="card" cx="350" cy="420" r="58"/><text class="label" text-anchor="middle" x="350" y="425">Rechnung</text><path class="line" d="M350 420 Q310.0 297.0 270 230" opacity="0.45"/><circle class="card" cx="270" cy="230" r="58"/><text class="label" text-anchor="middle" x="270" y="235">Prüfung</text><path class="line" d="M270 230 Q375.0 147.0 480 120" opacity="0.45"/><text class="small" x="48" y="500">Der Kreislauf zeigt, dass Prüfung und Anpassung zum Verständnis dazugehören.</text></svg>
