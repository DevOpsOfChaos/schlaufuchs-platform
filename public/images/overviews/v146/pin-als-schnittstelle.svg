<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540">
<title id="title">Pin als Schnittstelle</title><desc id="desc">Schematische Übersicht für eine Schlaufuchs-Überblicksseite.</desc><style>
      .bg{fill:#f8fafc}.card{fill:#ffffff;stroke:#334155;stroke-width:2}.soft{fill:#e2e8f0;stroke:#475569;stroke-width:1.5}.line{stroke:#334155;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#64748b;stroke-width:1.6;fill:none}.txt{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#0f172a;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#334155}.label{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#0f172a;font-weight:600}.accent{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}
    </style><rect class="bg" x="0" y="0" width="960" height="540" rx="24"/><text class="txt" x="48" y="58">Pin als Schnittstelle</text><rect class="card" x="90" y="170" width="160" height="80" rx="14"/><text class="label" text-anchor="middle" x="170" y="217">Register</text><path class="line" d="M250 210 H360"/><rect class="accent" x="360" y="155" width="190" height="110" rx="16"/><text class="label" text-anchor="middle" x="455" y="216">Pin-Treiber</text><path class="line" d="M550 210 H675"/><rect class="card" x="675" y="170" width="170" height="80" rx="14"/><text class="label" text-anchor="middle" x="760" y="217">GPIO-Pin</text><path class="muted" d="M170 315 H760"/><text class="small" x="410" y="345">Bezug / Rückweg / gemeinsamer Kontext</text><text class="small" x="48" y="485">Schaubild: elektrische Wirkung entsteht immer im Zusammenhang aus Quelle, Last, Bezug und Verbindung.</text></svg>
