</style><rect class="bg" x="0" y="0" width="960" height="540" rx="24"/><text class="txt" x="48" y="62">Linux-Fehlerdiagnose</text><rect class="accent" x="60" y="112" width="840" height="76" rx="18"/><text class="small" x="84" y="157">Linux-Themen werden klarer, wenn Rolle, Kontext, Prüfung und Ergebnis getrennt gelesen werden.</text><rect class="card" x="70.0" y="205" width="191.5" height="88" rx="16"/><text class="label" text-anchor="middle" x="165.8" y="255">Symptom</text><rect class="card" x="279.5" y="205" width="191.5" height="88" rx="16"/><text class="label" text-anchor="middle" x="375.2" y="255">Hypothese</text><rect class="card" x="489.0" y="205" width="191.5" height="88" rx="16"/><text class="label" text-anchor="middle" x="584.8" y="255">Prüfung</text><rect class="card" x="698.5" y="205" width="191.5" height="88" rx="16"/><text class="label" text-anchor="middle" x="794.2" y="255">Fix</text><path class="line" d="M264.5 249 H274.5"/><path class="line" d="m266.5 240 10 9-10 9"/><path class="line" d="M474.0 249 H484.0"/><path class="line" d="m476.0 240 10 9-10 9"/><path class="line" d="M683.5 249 H693.5"/><path class="line" d="m685.5 240 10 9-10 9"/><text class="small" x="48" y="486">Schaubild: vom Begriff über Prüfschritte zur sicheren Einordnung im Linux-Alltag.</text></svg>
