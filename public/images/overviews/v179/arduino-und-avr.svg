<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540">
  <title id="title">Arduino und AVR einordnen</title>
  <desc id="desc">Board, Mikrocontroller und Programm werden als verschiedene Ebenen gezeigt.</desc>
  <style>
    .bg{fill:#f8fafc}.card{fill:#fff;stroke:#334155;stroke-width:2}.soft{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.line{stroke:#334155;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#64748b;stroke-width:2;fill:none;stroke-linecap:round}.txt{font-family:Arial,Helvetica,sans-serif;font-size:24px;fill:#0f172a;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#0f172a;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#334155}
  </style>
  <rect class="bg" width="960" height="540" rx="28"/>
  <text class="txt" x="48" y="62">Arduino und AVR einordnen</text>
  <rect class="soft" x="90" y="170" width="190" height="110" rx="18"/><text class="label" x="185" y="232" text-anchor="middle">Board</text><path class="line" d="M280 225 H375"/><rect class="card" x="375" y="155" width="210" height="140" rx="18"/><text class="label" x="480" y="218" text-anchor="middle">Mikrocontroller</text><text class="small" x="480" y="246" text-anchor="middle">Pins · Speicher · Takt</text><path class="line" d="M585 225 H680"/><rect class="ok" x="680" y="170" width="190" height="110" rx="18"/><text class="label" x="775" y="232" text-anchor="middle">Programm</text>
  <text class="small" x="48" y="500">Arduino erklärt Praxiszugang; AVR beschreibt den eigentlichen Mikrocontroller-Kontext.</text>
</svg>
