<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540">
  <title id="title">Messfehler eingrenzen</title>
  <desc id="desc">Messbereich, Bezugspunkt und Plausibilität werden als Prüfkette gezeigt.</desc>
  <style>
    .bg{fill:#f8fafc}.card{fill:#fff;stroke:#334155;stroke-width:2}.soft{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.line{stroke:#334155;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#64748b;stroke-width:2;fill:none;stroke-linecap:round}.txt{font-family:Arial,Helvetica,sans-serif;font-size:24px;fill:#0f172a;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#0f172a;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#334155}
  </style>
  <rect class="bg" width="960" height="540" rx="28"/>
  <text class="txt" x="48" y="62">Messfehler eingrenzen</text>
  <rect class="card" x="80" y="205" width="180" height="95" rx="16"/><text class="label" x="170" y="260" text-anchor="middle">Messbereich</text><path class="line" d="M260 252 H365"/><rect class="card" x="365" y="205" width="210" height="95" rx="16"/><text class="label" x="470" y="260" text-anchor="middle">Bezugspunkt</text><path class="line" d="M575 252 H680"/><rect class="card" x="680" y="205" width="200" height="95" rx="16"/><text class="label" x="780" y="260" text-anchor="middle">Plausibilität</text>
  <text class="small" x="48" y="500">Messwerte werden besser, wenn Messaufbau und Erwartung gemeinsam geprüft werden.</text>
</svg>
