<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Grenzfallbetrachtung</title>
  <desc id="desc">Vereinfachtes Schaubild zur Überblicksseite Grenzfallbetrachtung.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="960" height="520" rx="32" fill="#f8fafc"/>
  <rect x="28" y="28" width="904" height="464" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="3" filter="url(#shadow)"/>
  <text x="480" y="82" text-anchor="middle" font-size="34" font-weight="800" fill="#0f172a">Grenzfallbetrachtung</text>
  <path d="M140 270 H820" stroke="#334155" stroke-width="8" stroke-linecap="round"/><line x1="150" y1="235" x2="150" y2="305" stroke="#1f2937" stroke-width="4"/><text x="150" y="350" text-anchor="middle" font-size="22" font-weight="700">Normalfall</text><line x1="370" y1="235" x2="370" y2="305" stroke="#1f2937" stroke-width="4"/><text x="370" y="350" text-anchor="middle" font-size="22" font-weight="700">Grenzfall</text><line x1="590" y1="235" x2="590" y2="305" stroke="#1f2937" stroke-width="4"/><text x="590" y="350" text-anchor="middle" font-size="22" font-weight="700">Vergleich</text><line x1="810" y1="235" x2="810" y2="305" stroke="#1f2937" stroke-width="4"/><text x="810" y="350" text-anchor="middle" font-size="22" font-weight="700">Prüfung</text><rect x="360" y="210" width="240" height="120" rx="24" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="12 10"/>
  <text x="480" y="480" text-anchor="middle" font-size="18" fill="#475569">Vereinfachte Orientierung – Details hängen vom konkreten Kontext ab.</text>
