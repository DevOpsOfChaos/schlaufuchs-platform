<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540">
<title id="title">Freilaufpfad bei Spulen</title>
<desc id="desc">Schematische Lernillustration für die Schlaufuchs-Überblicksseite Freilaufpfad bei Spulen.</desc>
<style>
.bg{fill:#f8fafc}.card{fill:#ffffff;stroke:#334155;stroke-width:2}.line{stroke:#334155;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}.txt{font-family:Arial,Helvetica,sans-serif;font-size:24px;fill:#0f172a;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#334155}.label{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#0f172a;font-weight:700}.accent{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}
</style>
<rect class="bg" x="0" y="0" width="960" height="540" rx="24"/>
