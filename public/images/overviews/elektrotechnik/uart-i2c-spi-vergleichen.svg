<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540">
<title id="title">UART, I2C und SPI vergleichen</title><desc id="desc">Schnittstellen unterscheiden sich durch Rollen, Leitungen und Absprachen im Datenverkehr.</desc><style>.bg{fill:#f8fafc}.card{fill:#fff;stroke:#334155;stroke-width:2}.soft{fill:#e2e8f0;stroke:#64748b;stroke-width:1.5}.accent{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.line{stroke:#334155;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#64748b;stroke-width:1.8;fill:none}.txt{font-family:Arial,Helvetica,sans-serif;font-size:20px;fill:#0f172a;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#0f172a;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#334155}</style>
<rect class="bg" x="0" y="0" width="960" height="540" rx="24"/><text class="txt" x="48" y="58">UART, I2C und SPI vergleichen</text>
