<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540"><title id="title">Kondensator und RC-Verhalten</title><desc id="desc">Kondensatoren verändern Schaltungen über Zeitverhalten, nicht nur über einen festen Einzelwert.</desc><style>.bg{fill:#f8fafc}.card{fill:#fff;stroke:#334155;stroke-width:2}.soft{fill:#e2e8f0;stroke:#64748b;stroke-width:1.5}.accent{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2}.line{stroke:#334155;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#64748b;stroke-width:1.8;fill:none}.txt{font-family:Arial,Helvetica,sans-serif;font-size:20px;fill:#0f172a;font-weight:700}.label{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#0f172a;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#334155}</style><rect class="bg" x="0" y="0" width="960" height="540" rx="24"/><text class="txt" x="48" y="58">Kondensator und RC-Verhalten</text><rect class="accent" x="10.0" y="200" width="140" height="92" rx="16"/><text class="label" text-anchor="middle" x="80.0" y="246">Spannung</text><text class="small" text-anchor="middle" x="80.0" y="270">Schritt 1</text><path class="line" d="M150.0 250 H276.7"/><path class="line" d="m263.7 238 14 12-14 12"/><rect class="card" x="276.7" y="200" width="140" height="92" rx="16"/><text class="label" text-anchor="middle" x="346.7" y="246">Ladung</text><text class="small" text-anchor="middle" x="346.7" y="270">Schritt 2</text><path class="line" d="M416.7 250 H543.3"/><path class="line" d="m530.3 238 14 12-14 12"/><rect class="card" x="543.3" y="200" width="140" height="92" rx="16"/><text class="label" text-anchor="middle" x="613.3" y="246">Zeitkonstante</text><text class="small" text-anchor="middle" x="613.3" y="270">Schritt 3</text><path class="line" d="M683.3 250 H810.0"/><path class="line" d="m797.0 238 14 12-14 12"/><rect class="ok" x="810.0" y="200" width="140" height="92" rx="16"/><text class="label" text-anchor="middle" x="880.0" y="246">Verlauf</text><text class="small" text-anchor="middle" x="880.0" y="270">Schritt 4</text><text class="small" x="48" y="492">Kondensatoren verändern Schaltungen über Zeitverhalten, nicht nur über einen festen Einzelwert.</text></svg>
