<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540"><title id="title">Rekursion und Abbruch</title><desc id="desc">Didaktische Übersicht zu Rekursion und Abbruch: Begriffe, Beziehung und typische Prüfspur.</desc><style>.bg{fill:#f8fafc}.card{fill:#ffffff;stroke:#334155;stroke-width:2}.line{stroke:#334155;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}.txt{font-family:Arial,Helvetica,sans-serif;font-size:24px;fill:#0f172a;font-weight:800}.label{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#0f172a;font-weight:700}.small{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#334155}</style><rect class="bg" width="960" height="540" rx="24"/><text class="txt" x="48" y="62">Rekursion und Abbruch</text><rect class="card" x="75" y="210" width="150" height="76" rx="16"/><text class="label" text-anchor="middle" x="150" y="255">Basisfall</text><path class="line" d="M230 248 H285"/><path class="line" d="m275 238 12 10-12 10"/><rect class="card" x="295" y="210" width="150" height="76" rx="16"/><text class="label" text-anchor="middle" x="370" y="255">Teilproblem</text><path class="line" d="M450 248 H505"/><path class="line" d="m495 238 12 10-12 10"/><rect class="card" x="515" y="210" width="150" height="76" rx="16"/><text class="label" text-anchor="middle" x="590" y="255">Abbruchbedingung</text><path class="line" d="M670 248 H725"/><path class="line" d="m715 238 12 10-12 10"/><rect class="card" x="735" y="210" width="150" height="76" rx="16"/><text class="label" text-anchor="middle" x="810" y="255">rekursiver Schritt</text><text class="small" x="48" y="494">Erst Begriffe klären, dann Ablauf, Grenzen und typische Fehler prüfen.</text></svg>