<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 540">
  <title id="title">High-Side und Low-Side schalten</title>
  <desc id="desc">Didaktisches Schaubild für eine Schlaufuchs-Überblicksseite.</desc>
  <rect width="960" height="540" rx="28" fill="#eff6ff"/>
  <text x="54" y="62" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" fill="#0f172a">High-Side und Low-Side schalten</text>
  <rect x="72" y="132" width="220" height="128" rx="20" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
  <rect x="370" y="132" width="220" height="128" rx="20" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
  <rect x="668" y="132" width="220" height="128" rx="20" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="96" cy="156" r="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <circle cx="394" cy="156" r="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <circle cx="692" cy="156" r="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
