  <text x="424" y="163" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Low-Side</text>
  <text x="722" y="163" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Lastpfad</text>
  <text x="96" y="215" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#334155">Beobachtung</text>
  <text x="394" y="215" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#334155">Einordnung</text>
  <text x="692" y="215" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#334155">Gegenprobe</text>
  <path d="M302 196 H356" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
