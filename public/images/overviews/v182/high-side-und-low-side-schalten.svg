  <rect x="115" y="332" width="730" height="96" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="480" y="372" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#0f172a">Erst Zusammenhang klären, dann Detailfall prüfen.</text>
  <text x="480" y="405" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#334155">Denkspur: Symptom → fachliche Einordnung → überprüfbare Gegenprobe.</text>
