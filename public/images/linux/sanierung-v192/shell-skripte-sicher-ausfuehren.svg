<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Shell-Skripte sicher ausführen</title>
  <desc id="desc">Ruhige Linux-Skizze mit Zustand, Eingriff, Kontrolle und Rückweg.</desc>
  <rect width="720" height="360" rx="28" fill="#f8fafc"/>
  <rect x="38" y="42" width="644" height="276" rx="22" fill="#ffffff" stroke="#dbe4ef" stroke-width="3"/>
  <text x="64" y="86" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Shell-Skripte sicher ausführen</text>
  <g font-family="Arial, sans-serif" font-size="17" fill="#0f172a">
    <rect x="70" y="126" width="126" height="72" rx="16" fill="#e0f2fe" stroke="#7dd3fc"/><text x="98" y="156" font-weight="700">Zustand</text><text x="96" y="180" fill="#334155">lesen</text>
    <path d="M206 162h70" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/><path d="m264 150 16 12-16 12" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="286" y="126" width="126" height="72" rx="16" fill="#fef3c7" stroke="#fbbf24"/><text x="320" y="156" font-weight="700">Eingriff</text><text x="316" y="180" fill="#334155">klein</text>
    <path d="M422 162h70" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/><path d="m480 150 16 12-16 12" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="502" y="126" width="126" height="72" rx="16" fill="#dcfce7" stroke="#86efac"/><text x="536" y="156" font-weight="700">Kontrolle</text><text x="538" y="180" fill="#334155">prüfen</text>
    <rect x="176" y="238" width="368" height="46" rx="14" fill="#f1f5f9" stroke="#cbd5e1"/><text x="218" y="267" font-weight="700">Rückweg dokumentieren · Risiko begrenzen</text>
  </g>
