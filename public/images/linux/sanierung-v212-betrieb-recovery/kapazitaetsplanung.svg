<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" role="img" aria-labelledby="title desc"><title id="title">Kapazitätsplanung</title><desc id="desc">Linux-Betriebsskizze zu Kapazitätsplanung: Zustand, Signal, Aktion und Recovery.</desc><rect width="920" height="540" rx="34" fill="#ecfdf5"/><rect x="54" y="54" width="812" height="432" rx="30" fill="#fff" stroke="#059669" stroke-width="5"/><text x="92" y="112" font-family="Arial" font-size="30" font-weight="700" fill="#064e3b">Kapazitätsplanung</text><text x="92" y="150" font-family="Arial" font-size="19" fill="#047857">Speicher, Dateisysteme und Kapazität · prüfen, handeln, absichern</text><g font-family="Arial" text-anchor="middle"><rect x="96" y="214" width="155" height="106" rx="20" fill="#d1fae5" stroke="#6ee7b7"/><text x="173" y="254" font-size="21" font-weight="700" fill="#064e3b">Zustand</text><text x="173" y="284" font-size="15" fill="#047857">Istlage</text><rect x="292" y="214" width="155" height="106" rx="20" fill="#d1fae5" stroke="#6ee7b7"/><text x="369" y="254" font-size="21" font-weight="700" fill="#064e3b">Signal</text><text x="369" y="284" font-size="15" fill="#047857">Log/Metrik</text><rect x="488" y="214" width="155" height="106" rx="20" fill="#d1fae5" stroke="#6ee7b7"/><text x="565" y="254" font-size="21" font-weight="700" fill="#064e3b">Aktion</text><text x="565" y="284" font-size="15" fill="#047857">Änderung</text><rect x="684" y="214" width="140" height="106" rx="20" fill="#d1fae5" stroke="#6ee7b7"/><text x="754" y="254" font-size="21" font-weight="700" fill="#064e3b">Fallback</text><text x="754" y="284" font-size="15" fill="#047857">Recovery</text></g><g fill="none" stroke="#059669" stroke-width="5" stroke-linecap="round"><path d="M260 267h24M456 267h24M652 267h24"/></g><g fill="#064e3b" font-family="Arial" font-size="18"><text x="100" y="382">1. Istzustand erfassen, bevor geändert wird</text><text x="100" y="414">2. Beleg über Log, Metrik oder Kommando notieren</text><text x="100" y="446">3. Kontrolle und Rückfallweg dokumentieren</text></g></svg>