<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Modellgrenzen begründen</title>
  <desc id="desc">Ruhige Lernskizze zu Modellgrenzen begründen: Kontext, Rechenweg, Kontrolle und Ergebnis werden getrennt sichtbar.</desc>
  <rect width="900" height="520" rx="32" fill="#fff7ed"/>
  <rect x="54" y="62" width="792" height="396" rx="28" fill="#ffffff" stroke="#c2410c" stroke-width="5"/>
  <text x="86" y="115" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#7c2d12">Modellgrenzen begründen</text>
  <text x="86" y="154" font-family="Arial, sans-serif" font-size="19" fill="#9a3412">Modellieren · prüfen statt nur rechnen</text>
  <g fill="none" stroke="#ea580c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M115 260h150"/>
    <path d="M265 260l-24-18m24 18-24 18"/>
    <path d="M375 260h150"/>
    <path d="M525 260l-24-18m24 18-24 18"/>
    <path d="M635 260h120"/>
  </g>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="83" y="205" width="160" height="108" rx="20" fill="#ffedd5" stroke="#fed7aa"/>
    <text x="163" y="247" font-size="22" font-weight="700" fill="#7c2d12">Situation</text>
    <text x="163" y="278" font-size="16" fill="#9a3412">gegeben lesen</text>
    <rect x="343" y="205" width="160" height="108" rx="20" fill="#ffedd5" stroke="#fed7aa"/>
    <text x="423" y="247" font-size="22" font-weight="700" fill="#7c2d12">Methode</text>
    <text x="423" y="278" font-size="16" fill="#9a3412">Schrittfolge</text>
    <rect x="603" y="205" width="190" height="108" rx="20" fill="#ffedd5" stroke="#fed7aa"/>
    <text x="698" y="247" font-size="22" font-weight="700" fill="#7c2d12">Kontrolle</text>
    <text x="698" y="278" font-size="16" fill="#9a3412">Probe und Sinn</text>
  </g>
  <g fill="#7c2d12" font-family="Arial, sans-serif" font-size="18">
    <text x="95" y="371">1. Begriffe und Größen markieren</text>
