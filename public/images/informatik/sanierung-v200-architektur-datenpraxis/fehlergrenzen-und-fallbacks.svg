<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Fehlergrenzen und Fallbacks</title>
  <desc id="desc">Didaktische Übersicht zu Fehlergrenzen und Fallbacks</desc>
  <rect width="960" height="540" rx="34" fill="#f8fafc"/>
  <rect x="70" y="70" width="820" height="400" rx="30" fill="#ffffff" stroke="#94a3b8" stroke-width="4"/>
  <text x="100" y="126" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Fehlergrenzen und Fallbacks</text>
  <g font-family="Arial, sans-serif" font-size="21" fill="#334155">
    <rect x="110" y="178" width="190" height="92" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
    <text x="145" y="232">Begriff</text>
    <rect x="385" y="178" width="190" height="92" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="415" y="232">Datenfluss</text>
    <rect x="660" y="178" width="190" height="92" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="690" y="232">Kontrolle</text>
    <path d="M305 224h70" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M580 224h70" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="210" y="330" width="540" height="76" rx="18" fill="#f1f5f9" stroke="#64748b" stroke-width="3"/>
    <text x="276" y="377">Verantwortung und Fehlergrenzen</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
