  <g fill="#312e81" font-family="Arial, sans-serif" font-size="18">
    <text x="96" y="382">1. Ziel und Eingaben benennen</text>
    <text x="96" y="414">2. Datenstruktur, Regel oder Schnittstelle begründen</text>
