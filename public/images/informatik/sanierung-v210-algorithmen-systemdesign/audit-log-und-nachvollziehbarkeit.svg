    <text x="375" y="255" font-size="21" font-weight="700" fill="#312e81">Logik</text>
    <text x="375" y="284" font-size="15" fill="#4338ca">Regeln klären</text>
    <rect x="510" y="218" width="150" height="96" rx="18" fill="#e0e7ff" stroke="#a5b4fc"/>
    <text x="585" y="255" font-size="21" font-weight="700" fill="#312e81">Zustand</text>
    <text x="585" y="284" font-size="15" fill="#4338ca">Änderung prüfen</text>
    <rect x="710" y="218" width="100" height="96" rx="18" fill="#e0e7ff" stroke="#a5b4fc"/>
    <text x="760" y="255" font-size="21" font-weight="700" fill="#312e81">Test</text>
    <text x="760" y="284" font-size="15" fill="#4338ca">Fall prüfen</text>
  </g>
  <g fill="none" stroke="#4f46e5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
