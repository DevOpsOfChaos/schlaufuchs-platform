<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" role="img" aria-labelledby="title desc">
  <title id="title">Audit-Log und Nachvollziehbarkeit</title>
  <desc id="desc">Didaktische Skizze zu Audit-Log und Nachvollziehbarkeit: Eingabe, Verarbeitung, Entscheidung und Prüfung werden als Informatik-Ablauf gezeigt.</desc>
  <rect width="920" height="540" rx="34" fill="#eef2ff"/>
  <rect x="58" y="58" width="804" height="424" rx="30" fill="#ffffff" stroke="#4f46e5" stroke-width="5"/>
  <text x="92" y="116" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#312e81">Audit-Log und Nachvollziehbarkeit</text>
  <text x="92" y="154" font-family="Arial, sans-serif" font-size="19" fill="#4338ca">Sicherheit und Risiko · verstehen, prüfen, begründen</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="90" y="218" width="150" height="96" rx="18" fill="#e0e7ff" stroke="#a5b4fc"/>
