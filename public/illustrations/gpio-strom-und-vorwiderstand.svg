<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">GPIO-Strompfad mit Vorwiderstand</title>
  <desc id="desc">Ein Mikrocontroller-Ausgang treibt eine LED über einen Vorwiderstand nach Masse. Der Strompfad ist markiert.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#eef5ff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#2563eb"/></marker>
  </defs>
  <rect width="920" height="360" rx="28" fill="url(#bg)"/>
  <rect x="54" y="80" width="210" height="200" rx="22" fill="#ffffff" stroke="#9db4d6" stroke-width="3"/>
  <text x="159" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#0f172a">ATmega</text>
  <text x="159" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" fill="#475569">GPIO-Pin</text>
  <circle cx="264" cy="180" r="9" fill="#2563eb"/>
  <path d="M273 180 H390" stroke="#2563eb" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="390" y="154" width="135" height="52" rx="16" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
  <text x="457" y="187" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#92400e">R</text>
  <path d="M525 180 H610" stroke="#2563eb" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <polygon points="620,145 620,215 675,180" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
  <line x1="690" y1="145" x2="690" y2="215" stroke="#d97706" stroke-width="5" stroke-linecap="round"/>
  <text x="655" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a">LED</text>
  <path d="M693 180 H780 V250" stroke="#2563eb" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M750 250h60M760 266h40M770 282h20" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
  <text x="780" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#334155">GND</text>
  <rect x="320" y="36" width="410" height="44" rx="16" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="525" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">Strom wird nicht geraten, sondern begrenzt.</text>
</svg>
