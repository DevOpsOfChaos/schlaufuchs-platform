<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Lineare Funktion mit Steigung und y-Achsenabschnitt</title>
  <desc id="desc">Koordinatensystem mit einer Geraden, markiertem y-Achsenabschnitt und Steigungsdreieck.</desc>
  <!-- Redrawn/adapted for Schlaufuchs from legacy Schlaufuchs taxonomy material, observed CC BY-NC-SA 4.0, author marker JW where supplied; no endorsement implied. -->
  <rect width="720" height="420" rx="24" fill="#f8fafc"/>
  <g transform="translate(90 330)">
    <line x1="0" y1="0" x2="560" y2="0" stroke="#334155" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="-260" stroke="#334155" stroke-width="3"/>
    <path d="M560 0l-12-7v14z" fill="#334155"/>
    <path d="M0 -260l-7 12h14z" fill="#334155"/>
    <text x="565" y="6" font-family="Arial, sans-serif" font-size="22" fill="#334155">x</text>
    <text x="-8" y="-272" font-family="Arial, sans-serif" font-size="22" fill="#334155">y</text>
    <g stroke="#cbd5e1" stroke-width="1">
      <line x1="80" y1="0" x2="80" y2="-240"/>
      <line x1="160" y1="0" x2="160" y2="-240"/>
      <line x1="240" y1="0" x2="240" y2="-240"/>
      <line x1="320" y1="0" x2="320" y2="-240"/>
      <line x1="400" y1="0" x2="400" y2="-240"/>
      <line x1="480" y1="0" x2="480" y2="-240"/>
      <line x1="0" y1="-60" x2="540" y2="-60"/>
      <line x1="0" y1="-120" x2="540" y2="-120"/>
      <line x1="0" y1="-180" x2="540" y2="-180"/>
      <line x1="0" y1="-240" x2="540" y2="-240"/>
    </g>
    <line x1="0" y1="-60" x2="500" y2="-210" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="-60" r="7" fill="#dc2626"/>
    <text x="18" y="-68" font-family="Arial, sans-serif" font-size="22" fill="#991b1b">b = f(0)</text>
    <path d="M240 -132h160v-48" fill="none" stroke="#16a34a" stroke-width="4"/>
    <text x="285" y="-104" font-family="Arial, sans-serif" font-size="22" fill="#166534">Δx</text>
    <text x="412" y="-150" font-family="Arial, sans-serif" font-size="22" fill="#166534">Δy</text>
    <text x="210" y="-245" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">f(x) = m · x + b</text>
    <text x="215" y="-215" font-family="Arial, sans-serif" font-size="21" fill="#334155">m = Δy / Δx</text>
  </g>
</svg>
