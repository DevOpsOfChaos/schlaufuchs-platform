<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Spannung und Stromrichtung trennen</title>
  <desc id="desc">Lernillustration zu Spannung und Stromrichtung trennen: vom Kontext über die Trennkante zur Gegenprobe.</desc>
  <rect width="960" height="320" rx="36" fill="#fff7ed"/>
  <circle cx="94" cy="78" r="48" fill="#fed7aa" opacity=".86"/>
  <text x="94" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#c2410c">E</text>
  <text x="160" y="74" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#0f172a">Spannung und Stromrichtung trennen</text>
  <text x="160" y="106" font-family="Arial, sans-serif" font-size="16" fill="#475569">Kleines Unterthema, klare Entscheidung, passende Aufgabe</text>
  <g transform="translate(54 154)">
    <rect width="178" height="96" rx="20" fill="#fff" stroke="#fed7aa" stroke-width="3"/>
    <text x="89" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#0f172a">Kontext</text>
    <text x="89" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">Was ist gegeben?</text>
  </g>
  <path d="M244 202h48" stroke="#c2410c" stroke-width="5" stroke-linecap="round"/><path d="m283 190 15 12-15 12" fill="none" stroke="#c2410c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(314 154)">
    <rect width="178" height="96" rx="20" fill="#fff" stroke="#fed7aa" stroke-width="3"/>
    <text x="89" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#0f172a">Trennkante</text>
    <text x="89" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">Was ist ähnlich?</text>
  </g>
  <path d="M504 202h48" stroke="#c2410c" stroke-width="5" stroke-linecap="round"/><path d="m543 190 15 12-15 12" fill="none" stroke="#c2410c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(574 154)">
    <rect width="178" height="96" rx="20" fill="#fff" stroke="#fed7aa" stroke-width="3"/>
    <text x="89" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#0f172a">Prüfung</text>
    <text x="89" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">Was entscheidet?</text>
  </g>
  <path d="M764 202h48" stroke="#c2410c" stroke-width="5" stroke-linecap="round"/><path d="m803 190 15 12-15 12" fill="none" stroke="#c2410c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(834 154)">
    <rect width="74" height="96" rx="20" fill="#fff" stroke="#fed7aa" stroke-width="3"/>
    <text x="37" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="800" fill="#0f172a">Gegen-</text>
    <text x="37" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="800" fill="#0f172a">probe</text>
  </g>
</svg>
