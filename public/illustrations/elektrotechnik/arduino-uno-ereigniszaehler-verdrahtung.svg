<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <!-- Redrawn/adapted from legacy Schlaufuchs Arduino counter task source: legacy/selected/elektrotechnik/tasks/arduino_zaehler_03/aufgabe/formeln/jw_zaehler_03_Steckplatine_web_. Legacy source observed as CC BY-NC-SA 4.0, author marker JW, 2020/2021. No endorsement by the original author is implied. -->
  <title id="title">Verdrahtung des Arduino-UNO-Ereigniszählers</title>
  <desc id="desc">Arduino UNO mit acht LED-Ausgängen an D0 bis D7 und einem Taster S1 an D10 beziehungsweise PB2 mit internem Pull-up gegen Masse.</desc>
  <style>
    .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2.5}.board{fill:#e0f2fe;stroke:#0369a1;stroke-width:4}.label-bg{fill:#fff}.wire{stroke:#334155;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.wire-led{stroke:#2563eb;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.wire-button{stroke:#b45309;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.node{fill:#0f766e}.led{fill:#fee2e2;stroke:#dc2626;stroke-width:4}.res{fill:#fef3c7;stroke:#b45309;stroke-width:3}.button{fill:#f1f5f9;stroke:#0f172a;stroke-width:4}.txt{font-family:Arial,Helvetica,sans-serif;fill:#0f172a}.label{font-size:25px;font-weight:700}.small{font-size:17px;fill:#475569}.pin{font-size:16px;font-weight:700;fill:#075985}.value{font-size:19px;font-weight:700;fill:#0f766e}
  </style>

  <rect class="bg" width="1400" height="760" rx="32"/>
  <text class="txt label" x="52" y="62">Arduino UNO als 8-Bit-Ereigniszähler</text>
  <text class="txt small" x="52" y="92">D0 bis D7 treiben die LEDs. D10/PB2 liest S1 mit internem Pull-up.</text>
  <rect class="panel" x="52" y="126" width="1296" height="560" rx="22"/>

  <rect class="board" x="92" y="188" width="292" height="330" rx="22"/>
  <text class="txt label" x="238" y="248" text-anchor="middle">Arduino UNO</text>
  <text class="txt small" x="238" y="282" text-anchor="middle">ATmega328P</text>
  <text class="txt small" x="238" y="318" text-anchor="middle">Port D: PD0 bis PD7</text>
  <text class="txt small" x="238" y="346" text-anchor="middle">Port B: PB2</text>

  <g aria-label="Arduino-Pins auf der Boardkante">
    <text class="txt pin" x="360" y="190" text-anchor="end">D0</text>
    <text class="txt pin" x="360" y="216" text-anchor="end">D1</text>
    <text class="txt pin" x="360" y="242" text-anchor="end">D2</text>
    <text class="txt pin" x="360" y="268" text-anchor="end">D3</text>
    <text class="txt pin" x="360" y="294" text-anchor="end">D4</text>
    <text class="txt pin" x="360" y="320" text-anchor="end">D5</text>
    <text class="txt pin" x="360" y="346" text-anchor="end">D6</text>
    <text class="txt pin" x="360" y="372" text-anchor="end">D7</text>
    <text class="txt pin" x="360" y="504" text-anchor="end">D10 / PB2</text>
    <circle class="node" cx="384" cy="185" r="7"/>
    <circle class="node" cx="384" cy="211" r="7"/>
    <circle class="node" cx="384" cy="237" r="7"/>
    <circle class="node" cx="384" cy="263" r="7"/>
    <circle class="node" cx="384" cy="289" r="7"/>
    <circle class="node" cx="384" cy="315" r="7"/>
    <circle class="node" cx="384" cy="341" r="7"/>
    <circle class="node" cx="384" cy="367" r="7"/>
    <circle class="node" cx="384" cy="500" r="7"/>
  </g>

  <g aria-label="Leitungen von D0 bis D7 zu den LEDs">
    <path class="wire-led" d="M384 185H528V448"/>
    <path class="wire-led" d="M384 211H602V448"/>
    <path class="wire-led" d="M384 237H676V448"/>
    <path class="wire-led" d="M384 263H750V448"/>
    <path class="wire-led" d="M384 289H824V448"/>
    <path class="wire-led" d="M384 315H898V448"/>
    <path class="wire-led" d="M384 341H972V448"/>
    <path class="wire-led" d="M384 367H1046V448"/>
  </g>

  <g aria-label="LED-Reihe">
    <rect class="label-bg" x="490" y="413" width="594" height="30" rx="8"/>
    <text class="txt pin" x="528" y="434" text-anchor="middle">D0 / PD0</text>
    <text class="txt pin" x="602" y="434" text-anchor="middle">D1 / PD1</text>
    <text class="txt pin" x="676" y="434" text-anchor="middle">D2 / PD2</text>
    <text class="txt pin" x="750" y="434" text-anchor="middle">D3 / PD3</text>
    <text class="txt pin" x="824" y="434" text-anchor="middle">D4 / PD4</text>
    <text class="txt pin" x="898" y="434" text-anchor="middle">D5 / PD5</text>
    <text class="txt pin" x="972" y="434" text-anchor="middle">D6 / PD6</text>
    <text class="txt pin" x="1046" y="434" text-anchor="middle">D7 / PD7</text>

    <circle class="led" cx="528" cy="466" r="18"/>
    <circle class="led" cx="602" cy="466" r="18"/>
    <circle class="led" cx="676" cy="466" r="18"/>
    <circle class="led" cx="750" cy="466" r="18"/>
    <circle class="led" cx="824" cy="466" r="18"/>
    <circle class="led" cx="898" cy="466" r="18"/>
    <circle class="led" cx="972" cy="466" r="18"/>
    <circle class="led" cx="1046" cy="466" r="18"/>

    <rect class="res" x="516" y="526" width="24" height="60" rx="5"/>
    <rect class="res" x="590" y="526" width="24" height="60" rx="5"/>
    <rect class="res" x="664" y="526" width="24" height="60" rx="5"/>
    <rect class="res" x="738" y="526" width="24" height="60" rx="5"/>
    <rect class="res" x="812" y="526" width="24" height="60" rx="5"/>
    <rect class="res" x="886" y="526" width="24" height="60" rx="5"/>
    <rect class="res" x="960" y="526" width="24" height="60" rx="5"/>
    <rect class="res" x="1034" y="526" width="24" height="60" rx="5"/>

    <path class="wire" d="M528 484V526M602 484V526M676 484V526M750 484V526M824 484V526M898 484V526M972 484V526M1046 484V526"/>
    <path class="wire" d="M528 586V626H1278M602 586V626M676 586V626M750 586V626M824 586V626M898 586V626M972 586V626M1046 586V626"/>
    <text class="txt small" x="796" y="660" text-anchor="middle">Jede LED hat einen eigenen Vorwiderstand nach GND.</text>
  </g>

  <g aria-label="Taster S1 an D10 beziehungsweise PB2">
    <path class="wire-button" d="M384 500H1170V456"/>
    <rect class="label-bg" x="408" y="436" width="104" height="48" rx="8"/>
    <text class="txt value" x="420" y="456">Pull-up</text>
    <text class="txt value" x="420" y="478">aktiv</text>

    <text class="txt label" x="1170" y="438" text-anchor="middle">S1</text>
    <rect class="button" x="1112" y="456" width="116" height="64" rx="12"/>
    <path class="wire" d="M1133 488h28M1180 488h28"/>
    <text class="txt small" x="1170" y="552" text-anchor="middle">Taster nach GND</text>
    <path class="wire" d="M1170 520V626"/>
  </g>

  <g aria-label="Masseanschluss">
    <path class="wire" d="M1278 626H1320"/>
    <path class="wire" d="M1308 626V650"/>
    <path class="wire" d="M1282 650h52"/>
    <path class="wire" d="M1292 665h32"/>
    <path class="wire" d="M1302 680h12"/>
    <text class="txt label" x="1266" y="730">GND</text>
  </g>
</svg>
