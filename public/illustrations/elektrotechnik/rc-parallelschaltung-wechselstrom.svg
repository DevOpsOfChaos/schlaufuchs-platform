<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <!-- Redrawn/adapted from legacy Schlaufuchs RCL task source: legacy/selected/elektrotechnik/tasks/rcl_i_01/pictures/schaltplan.png. Legacy source observed as CC BY-NC-SA 4.0, author marker JW, 2021. No endorsement by the original author is implied. -->
  <title id="title">RC-Parallelschaltung an sinusförmiger Wechselspannung</title>
  <desc id="desc">Eine sinusförmige Wechselspannungsquelle speist einen 22-Ohm-Widerstand und einen 47-Mikrofarad-Kondensator parallel. Die Zweigströme iR und iC addieren sich zum Gesamtstrom iges.</desc>
  <style>
    .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.wire{stroke:#334155;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.node{fill:#0f766e}.part{stroke:#0f172a;stroke-width:4;fill:#fff;stroke-linecap:round;stroke-linejoin:round}.source{fill:#fef3c7;stroke:#b45309;stroke-width:4}.accent{stroke:#0f766e;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.current{stroke:#dc2626;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.voltage{stroke:#2563eb;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.txt{font-family:Arial,Helvetica,sans-serif;fill:#0f172a}.label{font-size:22px;font-weight:700}.small{font-size:16px;fill:#475569}.value{font-size:20px;font-weight:700;fill:#0f766e}
  </style>
  <defs>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="540" rx="28"/>
  <text class="txt label" x="48" y="58">RC-Parallelschaltung im Wechselstromkreis</text>
  <text class="txt small" x="48" y="84">Bezug: vAC(t) = 6 V · sin(100π · t), R = 22 Ohm, C = 47 µF.</text>
  <rect class="panel" x="54" y="112" width="852" height="364" rx="18"/>

  <path class="wire" d="M168 352V214H744V352H168"/>
  <path class="wire" d="M372 214V352"/>
  <path class="wire" d="M600 214V352"/>

  <circle class="source" cx="168" cy="284" r="46"/>
  <path class="part" d="M137 284c12-28 50-28 62 0s50 28 62 0" transform="translate(-50 0)"/>
  <text class="txt label" x="96" y="214">v<tspan baseline-shift="sub" font-size="13">AC</tspan>(t)</text>
  <path class="voltage" marker-end="url(#arrow-blue)" d="M252 214V340"/>
  <text class="txt small" x="270" y="282">Spannungsbezug</text>

  <rect class="part" x="342" y="245" width="60" height="78" rx="8"/>
  <path class="part" d="M356 284h32"/>
  <path class="part" d="M360 264l24 20-24 20 24 20"/>
  <text class="txt label" x="372" y="234" text-anchor="middle">R</text>
  <text class="txt value" x="372" y="352" text-anchor="middle">22 Ohm</text>

  <path class="part" d="M566 274h68M566 300h68"/>
  <text class="txt label" x="600" y="234" text-anchor="middle">C</text>
  <text class="txt value" x="600" y="352" text-anchor="middle">47 µF</text>

  <path class="current" marker-end="url(#arrow-red)" d="M372 214H300"/>
  <text class="txt small" x="304" y="196">i<tspan baseline-shift="sub" font-size="11">R</tspan>(t)</text>
  <path class="current" marker-end="url(#arrow-red)" d="M600 214H682"/>
  <text class="txt small" x="628" y="196">i<tspan baseline-shift="sub" font-size="11">C</tspan>(t)</text>
  <path class="current" marker-end="url(#arrow-red)" d="M744 214V170"/>
  <text class="txt small" x="760" y="190">i<tspan baseline-shift="sub" font-size="11">ges</tspan>(t)</text>

  <circle class="node" cx="372" cy="214" r="10"/>
  <circle class="node" cx="372" cy="352" r="10"/>
  <circle class="node" cx="600" cy="214" r="10"/>
  <circle class="node" cx="600" cy="352" r="10"/>
  <circle class="node" cx="744" cy="214" r="10"/>
  <circle class="node" cx="744" cy="352" r="10"/>

  <text class="txt small" x="84" y="448">Der Widerstandsstrom ist in Phase zur Spannung; der Kondensatorstrom eilt der Spannung um 90° voraus.</text>
</svg>
