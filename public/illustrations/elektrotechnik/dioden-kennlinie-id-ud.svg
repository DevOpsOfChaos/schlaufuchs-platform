  </g>

  <rect x="630" y="92" width="250" height="54" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
  <text class="txt small" x="646" y="115">orange: einfache Naeherung</text>
  <text class="txt small" x="646" y="134">Grenze bei UD = 0,8 V</text>
