<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Qualität als wiederholbarer Ablauf</title>
  <desc id="desc">Schematische Lernillustration mit drei Stationen: Bauen, Prüfen und Verbessern.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="960" height="420" rx="34" fill="url(#bg)"/>
  <path d="M92 318 C190 236 250 365 352 280 S563 188 657 259 S790 333 873 223" fill="none" stroke="#93c5fd" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <g filter="url(#shadow)">
    <rect x="82" y="118" width="214" height="142" rx="26" fill="#ffffff" stroke="#bfdbfe" stroke-width="3"/>
    <rect x="373" y="88" width="214" height="172" rx="26" fill="#ffffff" stroke="#fde68a" stroke-width="3"/>
    <rect x="664" y="118" width="214" height="142" rx="26" fill="#ffffff" stroke="#bbf7d0" stroke-width="3"/>
  </g>
  <circle cx="189" cy="118" r="34" fill="#2563eb"/>
  <circle cx="480" cy="88" r="34" fill="#d97706"/>
  <circle cx="771" cy="118" r="34" fill="#16a34a"/>
  <text x="189" y="128" text-anchor="middle" font-size="30" font-weight="800" fill="#fff">1</text>
  <text x="480" y="98" text-anchor="middle" font-size="30" font-weight="800" fill="#fff">2</text>
  <text x="771" y="128" text-anchor="middle" font-size="30" font-weight="800" fill="#fff">3</text>
  <text x="189" y="181" text-anchor="middle" font-size="29" font-weight="800" fill="#0f172a">Bauen</text>
  <text x="480" y="164" text-anchor="middle" font-size="29" font-weight="800" fill="#0f172a">Prüfen</text>
  <text x="771" y="181" text-anchor="middle" font-size="29" font-weight="800" fill="#0f172a">Verbessern</text>
  <text x="189" y="222" text-anchor="middle" font-size="18" fill="#475569">lesen und einordnen</text>
  <text x="480" y="207" text-anchor="middle" font-size="18" fill="#475569">Zustand sichtbar machen</text>
  <text x="771" y="222" text-anchor="middle" font-size="18" fill="#475569">sauber rückmelden</text>
  <path d="M310 181 H352" stroke="#64748b" stroke-width="8" stroke-linecap="round"/>
  <path d="M352 181 l-18 -14 v28 z" fill="#64748b"/>
  <path d="M601 181 H643" stroke="#64748b" stroke-width="8" stroke-linecap="round"/>
  <path d="M643 181 l-18 -14 v28 z" fill="#64748b"/>
  <rect x="165" y="314" width="630" height="54" rx="27" fill="#0f172a" opacity="0.9"/>
  <text x="480" y="349" text-anchor="middle" font-size="23" font-weight="800" fill="#f8fafc">Qualität als wiederholbarer Ablauf</text>
