<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
<title id="title">Mikrocontroller-Debugkreislauf</title>
<desc id="desc">Versorgung, Mikrocontroller, Last und Messpunkte als Fehlersuchkreis.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#ecfdf5"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/></filter>
</defs>
<rect width="900" height="420" rx="34" fill="url(#bg)"/>
<g filter="url(#shadow)">
  <rect x="60" y="80" width="190" height="110" rx="24" fill="#ffffff" stroke="#93c5fd" stroke-width="3"/>
  <text x="155" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="25" font-weight="800" fill="#1e3a8a">Versorgung</text>
  <text x="155" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" fill="#334155">VCC · GND · Puffer</text>
  <rect x="355" y="55" width="190" height="160" rx="28" fill="#ffffff" stroke="#a7f3d0" stroke-width="3"/>
  <text x="450" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="25" font-weight="800" fill="#065f46">ATmega</text>
  <text x="450" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" fill="#334155">Code läuft nur</text>
  <text x="450" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" fill="#334155">bei stabiler Basis</text>
  <rect x="650" y="80" width="190" height="110" rx="24" fill="#ffffff" stroke="#fbbf24" stroke-width="3"/>
  <text x="745" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="25" font-weight="800" fill="#92400e">Last</text>
  <text x="745" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" fill="#334155">Motor · Relais · LED</text>
  <rect x="250" y="275" width="400" height="85" rx="24" fill="#ffffff" stroke="#c4b5fd" stroke-width="3"/>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#5b21b6">Messpunkte</text>
  <text x="450" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" fill="#334155">am IC messen · Masseweg prüfen · Reset beobachten</text>
</g>
<g fill="none" stroke="#475569" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
  <path d="M250 135h95"/><path d="M545 135h95"/><path d="M745 190c0 95-80 130-180 130"/><path d="M335 320c-105 0-180-40-180-130"/>
</g>
<g fill="#475569">
  <path d="M338 123l22 12-22 12z"/><path d="M633 123l22 12-22 12z"/><path d="M572 308l-24 12 24 12z"/><path d="M143 198l12-24 12 24z"/>
</g>
</svg>